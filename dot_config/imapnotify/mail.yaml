configurations:
  - host: mail.netyaga.com
    port: 993
    tls: true
    tlsOptions:
      rejectUnauthorized: true
      starttls: false
    username: busybusiness@max.netyaga.com
    alias: busybusiness
    passwordCMD: "secret-tool lookup service imap account busybusiness@max.netyaga.com host mail.netyaga.com"
    boxes:
      - mailbox: INBOX
        onNewMail: "systemctl --user start mbsync@busybusiness.service"
        onChangedMail: "systemctl --user start mbsync@busybusiness.service"
        onDeletedMail: "systemctl --user start mbsync@busybusiness.service"

